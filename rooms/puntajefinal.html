<!DOCTYPE html> 
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Final Score with Name and ID</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f4f4;
      padding: 20px;
      text-align: center;
    }
    table {
      margin: 20px auto;
      border-collapse: collapse;
      background: white;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }
    th, td {
      border: 1px solid #ccc;
      padding: 12px 20px;
      text-align: center;
    }
    th {
      background: #4CAF50;
      color: white;
    }
    input {
      padding: 10px;
      margin: 10px 5px;
      width: 250px;
      font-size: 16px;
      border-radius: 5px;
      border: 1px solid #ccc;
    }
    button {
      padding: 10px 20px;
      font-size: 16px;
      background: #4CAF50;
      border: none;
      color: white;
      border-radius: 5px;
      cursor: pointer;
      margin-top: 15px;
      margin-right: 10px;
    }
    button:hover {
      background: #45a049;
    }
  </style>
</head>
<body>

  <h1>🏆 Final Results</h1>

  <table>
    <thead>
      <tr>
        <th>Scenario</th>
        <th>Points</th>
      </tr>
    </thead>
    <tbody id="scoreTable"></tbody>
    <tfoot>
      <tr style="font-weight:bold; background:#ddd;">
        <td>Final Score</td>
        <td id="totalScore">0</td>
      </tr>
    </tfoot>
  </table>

  <div>
    <input type="text" id="fullName" placeholder="Write your full name" />
    <input type="text" id="ficha" placeholder="Write your ficha" />
  </div>

  <div>
    <button onclick="submit()">Submit</button>
    <button onclick="goHome()">Go to Home</button>
  </div>

  <script>
    // Mostrar puntajes desde localStorage
    const levelScores = JSON.parse(localStorage.getItem("levelScores")) || [];
    const maxScenarios = 5;
    const escenariosAMostrar = Math.min(levelScores.length, maxScenarios);

    const totalScore = levelScores.slice(0, maxScenarios).reduce((a,b) => a + (b || 0), 0);

    const scoreTableBody = document.getElementById("scoreTable");
    for(let i=0; i < escenariosAMostrar; i++) {
      const tr = document.createElement("tr");
      tr.innerHTML = `<td>Scenario ${i+1}</td><td>${levelScores[i] !== undefined ? levelScores[i] : 0}</td>`;
      scoreTableBody.appendChild(tr);
    }
    document.getElementById("totalScore").textContent = totalScore;

    function submit() {
      const fullName = document.getElementById("fullName").value.trim();
      const ficha = document.getElementById("ficha").value.trim();

      if (!fullName) {
        alert("Please enter your full name.");
        return;
      }
      if (!ficha) {
        alert("Please enter your ficha.");
        return;
      }

      alert(`Thank you, ${fullName}! Your ficha is ${ficha}.\nYour total score is ${totalScore}.`);
    }

    function goHome() {
      window.location.href = "../home.html"; // Cambia la ruta si es necesario
    }
  </script>

</body>
</html>
