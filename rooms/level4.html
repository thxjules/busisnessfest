<body>
  <section class="Welcome">
    <div class="container">
      <h1>Knowledge Unlocks the Way</h1>
      <p>You’re in a high-security data vault. Match each clue with the correct concept in English.</p>
      <p>You have <span id="timer">02:00</span> minutes.</p>
      <p>No fields can be left blank.</p>

      <div id="folders-container"></div>

      <button onclick="submitAnswers()" id="submit-btn">Unlock</button>
      <div id="result"></div>
      <button id="continue-btn" onclick="next()">Continue</button>
    </div>
  </section>

  <script>
    function next() {
      window.location.href = "./homeL5.html";
    }

    const correctWords = [
      "information",
      "reasons",
      "undercurrents",
      "pitfalls",
      "acknowledging",
      "offer up"
    ];

    const folderHints = [
      "Facts that guide a project.",
      "The logic behind a difficult choice.",
      "What’s hidden beneath workplace conflicts.",
      "Common traps in decision-making.",
      "Recognizing someone's value.",
      "Sharing internal insights with your team."
    ];

    const folderContainer = document.getElementById("folders-container");

    // Crear inputs con hint y recuperar progreso guardado
    for (let i = 0; i < 6; i++) {
      const div = document.createElement("div");
      div.className = "folder";

      div.innerHTML = `
        <p><strong>Hint ${i + 1}</strong></p>
        <p>${folderHints[i]}</p>
        <input type="text" id="input${i}" placeholder="Type answer" class="hidden-input">
        <span class="icon-result" id="icon${i}"></span>
      `;

      div.addEventListener("click", function () {
        const input = div.querySelector("input");
        input.classList.toggle("show");
        if (input.classList.contains("show")) {
          setTimeout(() => input.focus(), 300);
        }
      });

      folderContainer.appendChild(div);
    }

    const submitBtn = document.getElementById("submit-btn");
    const continueBtn = document.getElementById("continue-btn");
    const resultDiv = document.getElementById("result");

    let gameFinished = false;

    // Cargar progreso guardado y llenar inputs
    let savedProgress = JSON.parse(localStorage.getItem("progress_level4")) || [];
    for (let i = 0; i < 6; i++) {
      if (savedProgress[i]) {
        const input = document.getElementById(`input${i}`);
        input.value = savedProgress[i];
        input.classList.add("show"); // Mostrar inputs con texto guardado
      }
    }

    // Guardar progreso en cada input mientras escribe, si no terminó
    for (let i = 0; i < 6; i++) {
      document.getElementById(`input${i}`).addEventListener("input", () => {
        if (!gameFinished) {
          let currentProgress = [];
          for (let j = 0; j < 6; j++) {
            currentProgress[j] = document.getElementById(`input${j}`).value;
          }
          localStorage.setItem("progress_level4", JSON.stringify(currentProgress));
        }
      });
    }

    function disableInputs() {
      for (let i = 0; i < 6; i++) {
        document.getElementById(`input${i}`).disabled = true;
      }
      submitBtn.disabled = true;
    }

    function submitAnswers() {
      let correctCount = 0;
      let hasError = false;

      for (let i = 0; i < 6; i++) {
        const input = document.getElementById(`input${i}`);
        const icon = document.getElementById(`icon${i}`);
        const userAnswer = input.value.trim().toLowerCase();
        const correct = correctWords[i].toLowerCase();

        input.classList.remove("correct", "incorrect");
        icon.textContent = "";

        if (userAnswer === "") {
          input.classList.add("incorrect");
          icon.textContent = "⚠";
          hasError = true;
          continue;
        }

        if (!/^[a-zA-Z\s]+$/.test(userAnswer)) {
          input.classList.add("incorrect");
          icon.textContent = "❌ Letters only";
          hasError = true;
          continue;
        }

        if (userAnswer === correct) {
          input.classList.add("correct");
          icon.textContent = "✅";
          correctCount++;
        } else {
          input.classList.add("incorrect");
          icon.textContent = "❌";
        }
      }

      if(hasError) {
        resultDiv.innerHTML = "Please fill all folders with valid words (letters only).";
        continueBtn.style.display = "none";
        return;
      }

      const scoreTable = {
        6: 20,
        5: 15,
        4: 10,
        3: 5,
        2: 2,
        1: 1,
        0: 0
      };

      let totalPoints = scoreTable[correctCount] || 0;

      // Guardar puntaje en localStorage
      let levelScores = JSON.parse(localStorage.getItem("levelScores")) || [];
      levelScores[3] = totalPoints;
      localStorage.setItem("levelScores", JSON.stringify(levelScores));

      resultDiv.innerHTML = `You got <strong>${correctCount}</strong> correct answers.<br>
                             Points this level: <strong>${totalPoints}</strong>`;

      disableInputs();
      continueBtn.style.display = "inline-block";

      // Limpiar progreso guardado porque terminó
      localStorage.removeItem("progress_level4");
      // Limpiar tiempo guardado porque terminó
      localStorage.removeItem("timeLeft_level4");

      gameFinished = true;
    }

    // Recuperar tiempo guardado o usar 120 segundos
    let time = parseInt(localStorage.getItem("timeLeft_level4"));
    if (isNaN(time) || time < 0) time = 120;
    const timerEl = document.getElementById("timer");
    const countdown = setInterval(() => {
      if(time < 0){
        clearInterval(countdown);
        timerEl.textContent = "Time's up!";
        submitAnswers();
        return;
      }
      const minutes = Math.floor(time / 60);
      const seconds = time % 60;
      timerEl.textContent = `${minutes.toString().padStart(2, "0")}:${seconds.toString().padStart(2, "0")}`;
      time--;
      // Guardar tiempo restante
      localStorage.setItem("timeLeft_level4", time);
    }, 1000);

    // Confirmar antes de cerrar o recargar si no terminó
    window.addEventListener('beforeunload', function(e) {
      if (!gameFinished) {
        e.preventDefault();
        e.returnValue = '';
      }
    });
  </script>
