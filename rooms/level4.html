<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Escape Room - Nivel 1</title>
<style>
  body {
    font-family: Arial, sans-serif;
    text-align: center;
    background-color: #f4f4f4;
    padding: 20px;
  }
  input {
    padding: 10px;
    font-size: 18px;
    width: 300px;
  }
  button {
    padding: 10px 20px;
    font-size: 18px;
    margin-top: 10px;
  }
  #timer {
    font-size: 28px;
    margin: 20px 0;
  }
  .bloqueado {
    background-color: #ccc;
  }
</style>
</head>
<body>

<h1>Nivel 1</h1>
<p id="timer"></p>
<input type="text" id="respuesta" placeholder="Escribe tu respuesta">
<br>
<button id="enviar">Enviar</button>

<audio id="alerta" src="https://www.soundjay.com/buttons/beep-07.wav"></audio>

<script>
let duracion = 30; // segundos totales del nivel
let tiempoRestante;
let intervalo;

function iniciarTiempo() {
  // Verificar si hay tiempo guardado
  const tiempoGuardado = localStorage.getItem("tiempoRestante");
  if (tiempoGuardado !== null) {
    tiempoRestante = parseInt(tiempoGuardado);
  } else {
    tiempoRestante = duracion;
  }

  mostrarTiempo();

  intervalo = setInterval(() => {
    tiempoRestante--;
    localStorage.setItem("tiempoRestante", tiempoRestante);

    mostrarTiempo();

    if (tiempoRestante <= 5 && tiempoRestante > 0) {
      document.getElementById("alerta").play();
    }

    if (tiempoRestante <= 0) {
      clearInterval(intervalo);
      localStorage.removeItem("tiempoRestante");
      verificarRespuesta();
    }
  }, 1000);
}

function mostrarTiempo() {
  document.getElementById("timer").textContent = "Tiempo: " + tiempoRestante + "s";
}

function verificarRespuesta() {
  const respuesta = document.getElementById("respuesta").value.trim();
  
  // Bloquear input
  document.getElementById("respuesta").disabled = true;
  document.getElementById("respuesta").classList.add("bloqueado");
  document.getElementById("enviar").disabled = true;

  if (respuesta === "") {
    alert("Tiempo agotado y no escribiste nada. Pasas al siguiente nivel.");
  } else {
    alert("Tiempo agotado. Tu respuesta: " + respuesta);
  }

  // Aquí puedes redirigir al siguiente nivel
  window.location.href = "nivel2.html";
}

document.getElementById("enviar").addEventListener("click", () => {
  clearInterval(intervalo);
  localStorage.removeItem("tiempoRestante");
  verificarRespuesta();
});

window.onload = iniciarTiempo;
</script>

</body>
</html>
