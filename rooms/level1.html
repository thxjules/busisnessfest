<!DOCTYPE html> 
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="google" content="notranslate">
  <title>Escape Room - Level 1</title>
  <link rel="stylesheet" href="../css/homeL1.css">
</head>
<body>
  <section class="Welcome">
    <div class="container">
      <h1>The Key to Business Progress</h1>
      <p>You’re in an office. Explore each folder and guess the correct word (English only).</p>
      <p>You have <span id="timer">02:00</span> minutes.</p>
      <p>No fields can be left blank.</p>

      <div id="folders-container"></div>

      <button onclick="submitAnswers()" id="submit-btn">Unlock</button>
      <div id="result"></div>
      <button id="continue-btn" style="display:none;" onclick="next()">Continue</button>
    </div>
  </section>

  <script>
    let gameFinished = false; // VARIABLE para controlar si terminó el juego

    function next() {
      window.location.href = "./homeL2.html";
    }

    const correctWords = [
      "methodological",
      "expectation",
      "team",
      "grow",
      "planned",
      "brand loyalty"
    ];

    const folderHints = [
      "A logical and organized way of working.",
      "A future goal to be achieved.",
      "The strength of collaboration.",
      "The constant drive to grow.",
      "A well-structured strategy.",
      "Loyalty of customers who love a brand."
    ];

    const folderContainer = document.getElementById("folders-container");

    // Carga inicial del progreso guardado
    let savedProgress = JSON.parse(localStorage.getItem("progress_level1")) || {};

    for (let i = 0; i < 6; i++) {
      const div = document.createElement("div");
      div.className = "folder";
      div.innerHTML = `
        <p><strong>Hint ${i + 1}</strong></p>
        <p>${folderHints[i]}</p>
        <input type="text" id="input${i}" placeholder="Type answer" value="${savedProgress[`input${i}`] || ''}">
        <span class="icon-result" id="icon${i}"></span>
      `;
      folderContainer.appendChild(div);
    }

    const submitBtn = document.getElementById("submit-btn");
    const continueBtn = document.getElementById("continue-btn");
    const resultDiv = document.getElementById("result");

    // Guardar cada cambio en localStorage
    function saveProgress(inputId, value) {
      savedProgress[inputId] = value;
      localStorage.setItem("progress_level1", JSON.stringify(savedProgress));
    }

    // Añadimos event listeners para guardar al escribir
    for (let i = 0; i < 6; i++) {
      const input = document.getElementById(`input${i}`);
      input.addEventListener('input', (e) => {
        if (!gameFinished) {  // Solo guardar si no terminó
          saveProgress(e.target.id, e.target.value);
        }
      });
    }

    function submitAnswers() {
      let correctCount = 0;
      let hasError = false;

      for (let i = 0; i < 6; i++) {
        const input = document.getElementById(`input${i}`);
        const icon = document.getElementById(`icon${i}`);
        const userAnswer = input.value.trim().toLowerCase();
        const correct = correctWords[i].toLowerCase();

        input.classList.remove("correct", "incorrect");
        icon.textContent = "";

        if (userAnswer === "") {
          input.classList.add("incorrect");
          icon.textContent = "⚠";
          hasError = true;
          continue;
        }

        if (!/^[a-zA-Z\s]+$/.test(userAnswer)) {
          input.classList.add("incorrect");
          icon.textContent = "❌ Letters only";
          hasError = true;
          continue;
        }

        if (userAnswer === correct) {
          input.classList.add("correct");
          icon.textContent = "✅";
          correctCount++;
        } else {
          input.classList.add("incorrect");
          icon.textContent = "❌";
        }
      }

      if (hasError) {
        resultDiv.innerHTML = "Please fill all folders with valid words (letters only).";
        continueBtn.style.display = "none";
        return;
      }

      let totalPoints = 0;
      switch (correctCount) {
        case 6: totalPoints = 30; break;
        case 5: totalPoints = 25; break;
        case 4: totalPoints = 20; break;
        case 3: totalPoints = 15; break;
        case 2: totalPoints = 10; break;
        case 1: totalPoints = 5; break;
        default: totalPoints = 0;
      }

      // Guardar puntaje solo de este nivel, sin acumular total
      let scores = JSON.parse(localStorage.getItem("levelScores")) || [];
      scores[0] = totalPoints;
      localStorage.setItem("levelScores", JSON.stringify(scores));

      resultDiv.innerHTML = `You got <strong>${correctCount}</strong> correct answers. 
                             Points this level: <strong>${totalPoints}</strong>`;

      // Deshabilitar botón de enviar para que no envíen más
      submitBtn.disabled = true;
      // Deshabilitar inputs para que no puedan seguir escribiendo
      for (let i = 0; i < 6; i++) {
        const inp = document.getElementById(`input${i}`);
        inp.disabled = true;
      }

      // Marcar juego como terminado
      gameFinished = true;

      // Limpiar progreso guardado porque ya terminó
      localStorage.removeItem("progress_level1");

      // Limpiar tiempo guardado porque ya terminó
      localStorage.removeItem("timeLeft_level1");

      // Mostrar botón para continuar
      continueBtn.style.display = "inline-block";
    }

    // ===== TEMPORIZADOR CON GUARDADO EN localStorage =====
    const TIMER_KEY = "timeLeft_level1";

    // Recuperar tiempo guardado o usar 120 segundos
    let time = parseInt(localStorage.getItem(TIMER_KEY));
    if (isNaN(time) || time < 0) time = 120;

    const timerEl = document.getElementById("timer");

    const countdown = setInterval(() => {
      const minutes = Math.floor(time / 60);
      const seconds = time % 60;
      timerEl.textContent = `${minutes.toString().padStart(2, "0")}:${seconds.toString().padStart(2, "0")}`;

      time--;

      if (time < 0) {
        clearInterval(countdown);
        timerEl.textContent = "Time's up!";
        localStorage.removeItem(TIMER_KEY); // borrar tiempo guardado al acabar
        submitAnswers();
        gameFinished = true;
        next(); // Avanzar automático al siguiente nivel
      } else {
        // Guardar tiempo restante
        localStorage.setItem(TIMER_KEY, time);
      }
    }, 1000);

    // Confirmar antes de salir o recargar si no terminó el juego
    window.addEventListener('beforeunload', function(e) {
      if (!gameFinished) {
        e.preventDefault();
        e.returnValue = '';
      }
    });
  </script>
</body>
</html>
