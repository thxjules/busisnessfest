<!DOCTYPE html>  
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Escape Room - Scenario 3</title>
  <link rel="stylesheet" href="../css/homeL1.css">
  <style>
    .container {
      max-width: 900px;
      margin: auto;
      padding: 20px;
    }
    input[type="text"] {
      width: 100%;
      max-width: 300px;
      margin-top: 5px;
    }
    button {
      margin-top: 10px;
    }
    @media (max-width: 600px) {
      h1 {
        font-size: 1.5rem;
      }
      p {
        font-size: 0.9rem;
      }
      input[type="text"] {
        max-width: 100%;
      }
    }
  </style>
</head>
<body>
  <section class="Welcome">
    <div class="container">
      <h1>The Map of Decisions</h1>
      <p>You’ve entered the Business Analysis Room. Match each clue with the correct concept in English.</p>
      <p>You have <span id="timer">02:00</span> minutes.</p>

      <div id="folders-container"></div>

      <button onclick="submitAnswers()" id="submit-btn">Unlock</button>
      <div id="result"></div>
      <button id="continue-btn" onclick="next()" style="display:none;">Continue</button>
    </div>
  </section>

  <script>
    function next() {
      window.location.href = "./homeL4.html";
    }

    const correctWords = [
      "causal chain",
      "flowchart",
      "solver",
      "work environment",
      "relationship",
      "channel"
    ];

    const folderHints = [
      "A logical sequence that links cause and effect.",
      "A visual scheme for step-by-step decision-making.",
      "A person who effectively solves problems.",
      "The workplace setting that shapes productivity.",
      "The bonds between people that influence results.",
      "The medium through which information flows."
    ];

    const folderContainer = document.getElementById("folders-container");

    // Crear inputs y cargar progreso guardado si existe
    for (let i = 0; i < folderHints.length; i++) {
      const div = document.createElement("div");
      div.className = "folder";
      div.innerHTML = `
        <p><strong>Hint ${i + 1}</strong></p>
        <p>${folderHints[i]}</p>
        <input type="text" id="input${i}" placeholder="Type answer">
        <span class="icon-result" id="icon${i}"></span>
      `;
      folderContainer.appendChild(div);
    }

    // Recuperar progreso guardado (array de respuestas)
    let savedProgress = JSON.parse(localStorage.getItem("progress_level3")) || [];
    // Llenar inputs con progreso si hay
    for (let i = 0; i < correctWords.length; i++) {
      if (savedProgress[i]) {
        document.getElementById(`input${i}`).value = savedProgress[i];
      }
    }

    const submitBtn = document.getElementById("submit-btn");
    const continueBtn = document.getElementById("continue-btn");
    const resultDiv = document.getElementById("result");

    let gameFinished = false;

    // Guardar cambios en inputs en localStorage
    for (let i = 0; i < correctWords.length; i++) {
      document.getElementById(`input${i}`).addEventListener("input", () => {
        if (!gameFinished) {
          let currentProgress = [];
          for (let j = 0; j < correctWords.length; j++) {
            currentProgress[j] = document.getElementById(`input${j}`).value;
          }
          localStorage.setItem("progress_level3", JSON.stringify(currentProgress));
        }
      });
    }

    function submitAnswers() {
      let correctCount = 0;
      let hasError = false;

      for (let i = 0; i < correctWords.length; i++) {
        const input = document.getElementById(`input${i}`);
        const icon = document.getElementById(`icon${i}`);
        const userAnswer = input.value.trim().toLowerCase();
        const correct = correctWords[i].toLowerCase();

        input.classList.remove("correct", "incorrect");
        icon.textContent = "";

        if (userAnswer === "") {
          input.classList.add("incorrect");
          icon.textContent = "⚠";
          hasError = true;
          continue;
        }

        if (!/^[a-zA-Z\s]+$/.test(userAnswer)) {
          input.classList.add("incorrect");
          icon.textContent = "❌ Letters only";
          hasError = true;
          continue;
        }

        if (userAnswer === correct) {
          input.classList.add("correct");
          icon.textContent = "✅";
          correctCount++;
        } else {
          input.classList.add("incorrect");
          icon.textContent = "❌";
        }
      }

      if (hasError) {
        resultDiv.innerHTML = "Please fill all folders with valid words (letters only).";
        continueBtn.style.display = "none";
        return false;
      }

      let totalPoints = 0;
      switch (correctCount) {
        case 6: totalPoints = 20; break;
        case 5: totalPoints = 15; break;
        case 4: totalPoints = 10; break;
        case 3: totalPoints = 5; break;
        case 2: totalPoints = 2; break;
        case 1: totalPoints = 1; break;
        default: totalPoints = 0;
      }

      // Guardar puntaje en localStorage
      let levelScores = JSON.parse(localStorage.getItem("levelScores")) || [];
      levelScores[2] = totalPoints; 
      localStorage.setItem("levelScores", JSON.stringify(levelScores));

      resultDiv.innerHTML = `You got <strong>${correctCount}</strong> correct answers. 
                             Points this level: <strong>${totalPoints}</strong>`;

      // Deshabilitar inputs y botón para evitar más respuestas
      for (let i = 0; i < correctWords.length; i++) {
        document.getElementById(`input${i}`).disabled = true;
      }
      submitBtn.disabled = true;

      // Limpiar progreso guardado porque terminó
      localStorage.removeItem("progress_level3");
      // Limpiar tiempo guardado porque terminó
      localStorage.removeItem("timeLeft_level3");

      gameFinished = true;

      continueBtn.style.display = "inline-block";
      return true;
    }

    // Recuperar tiempo guardado o usar 120 segundos
    let time = parseInt(localStorage.getItem("timeLeft_level3"));
    if (isNaN(time) || time < 0) time = 120;
    const timerEl = document.getElementById("timer");

    const countdown = setInterval(() => {
      if (time < 0) {
        clearInterval(countdown);
        timerEl.textContent = "Time's up!";

        // Llamar submitAnswers para mostrar resultado y bloquear inputs
        submitAnswers();

        // Avanzar automáticamente después de 3 segundos
        setTimeout(next, 3000);

        return;
      } else {
        const minutes = Math.floor(time / 60);
        const seconds = time % 60;
        timerEl.textContent = `${minutes.toString().padStart(2, "0")}:${seconds.toString().padStart(2, "0")}`;
        time--;
        // Guardar tiempo restante
        localStorage.setItem("timeLeft_level3", time);
      }
    }, 1000);

    // Confirmar antes de salir o recargar si no terminó el juego
    window.addEventListener('beforeunload', function(e) {
      if (!gameFinished) {
        e.preventDefault();
        e.returnValue = '';
      }
    });
  </script>
</body>
</html>
