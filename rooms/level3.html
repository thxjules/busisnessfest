<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Escape Room - Scenario 3</title>
  <link rel="stylesheet" href="../css/homeL1.css">
</head>
<body>
  <section class="Welcome">
    <div class="container">
      <h1>The Map of Decisions</h1>
      <p>You’ve entered the Business Analysis Room. Match each clue with the correct concept in English.</p>
      <p>You have <span id="timer">02:00</span> minutes.</p>

      <div id="folders-container"></div>

      <button onclick="submitAnswers()">Unlock</button>
      <div id="result"></div>
      <button id="continue-btn" onclick="next()">Continue</button>
    </div>
  </section>

  <script>
    function next() {
      window.location.href = "./next-room.html";
    }

    const correctWords = [
      "causal chain",
      "flowchart",
      "solver",
      "work environment",
      "relationship",
      "channel"
    ];

    const folderHints = [
      "A logical sequence that links cause and effect.",
      "A visual scheme for step-by-step decision-making.",
      "A person who effectively solves problems.",
      "The workplace setting that shapes productivity.",
      "The bonds between people that influence results.",
      "The medium through which information flows."
    ];

    const folderContainer = document.getElementById("folders-container");

    for (let i = 0; i < 6; i++) {
      const div = document.createElement("div");
      div.className = "folder";
      div.innerHTML = `
        <p><strong>Hint ${i + 1}</strong></p>
        <p>${folderHints[i]}</p>
        <input type="text" id="input${i}" placeholder="Type answer">
        <span class="icon-result" id="icon${i}"></span>
      `;
      folderContainer.appendChild(div);
    }

    function submitAnswers() {
      let correctCount = 0;
      let hasError = false;

      for (let i = 0; i < 6; i++) {
        const input = document.getElementById(`input${i}`);
        const icon = document.getElementById(`icon${i}`);
        const userAnswer = input.value.trim().toLowerCase();
        const correct = correctWords[i].toLowerCase();

        input.classList.remove("correct", "incorrect");
        icon.textContent = "";

        if (userAnswer === "") {
          input.classList.add("incorrect");
          icon.textContent = "⚠";
          hasError = true;
          continue;
        }

        if (!/^[a-zA-Z\s]+$/.test(userAnswer)) {
          input.classList.add("incorrect");
          icon.textContent = "❌ Letters only";
          hasError = true;
          continue;
        }

        if (userAnswer === correct) {
          input.classList.add("correct");
          icon.textContent = "✅";
          correctCount++;
        } else {
          input.classList.add("incorrect");
          icon.textContent = "❌";
        }
      }

      const resultDiv = document.getElementById("result");
      const continueBtn = document.getElementById("continue-btn");

      if (hasError) {
        resultDiv.innerHTML = "Please fill all folders with valid words (letters only).";
        continueBtn.style.display = "none";
        return;
      }

      let totalPoints = correctCount * 5;

      resultDiv.innerHTML = `You got <strong>${correctCount}</strong> correct answers. Final score: <strong>${totalPoints}</strong> points`;

      if (correctCount === 6) {
        continueBtn.style.display = "inline-block";
      } else {
        continueBtn.style.display = "none";
      }
    }

    let time = 120;
    const timerEl = document.getElementById("timer");
    const countdown = setInterval(() => {
      const minutes = Math.floor(time / 60);
      const seconds = time % 60;
      timerEl.textContent = `${minutes.toString().padStart(2, "0")}:${seconds.toString().padStart(2, "0")}`;
      time--;
      if (time < 0) {
        clearInterval(countdown);
        timerEl.textContent = "Time's up!";
        submitAnswers();
      }
    }, 1000);
  </script>
</body>
</html>
