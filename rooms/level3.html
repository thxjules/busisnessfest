<!DOCTYPE html>  
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Escape Room - Scenario 3</title>
  <style>
    body {
      background: linear-gradient(135deg, #14270f, #204327, #2c6445);
      color: #fff;
      font-family: 'Poppins', sans-serif;
      margin: 0;
      padding: 0;
      min-height: 100vh;
    }
    .container {
      max-width: 900px;
      margin: auto;
      padding: 20px;
      background: rgba(0, 0, 0, 0.3);
      border-radius: 15px;
      box-shadow: 0 8px 25px rgba(0,0,0,0.5);
    }
    h1 {
      text-align: center;
      font-size: 2.2rem;
      letter-spacing: 1px;
      margin-bottom: 10px;
    }
    p {
      font-size: 1.1rem;
      text-align: center;
      margin-bottom: 15px;
    }
    #timer {
      font-weight: bold;
      color: #ff4b2b;
    }
    .folder {
      background: rgba(255,255,255,0.08);
      padding: 15px;
      margin: 15px 0;
      border-radius: 10px;
      transition: transform 0.2s ease;
    }
    .folder:hover {
      transform: scale(1.02);
      background: rgba(255,255,255,0.12);
    }
    input[type="text"] {
      width: 100%;
      max-width: 300px;
      margin-top: 5px;
      padding: 10px;
      border-radius: 8px;
      border: none;
      outline: none;
      font-size: 1rem;
      background: rgba(255,255,255,0.2);
      color: #fff;
      transition: 0.3s;
    }
    input[type="text"]:focus {
      background: rgba(255,255,255,0.3);
      box-shadow: 0 0 10px #ff4b2b;
    }
    input.correct {
      border: 2px solid #00ff88;
    }
    input.incorrect {
      border: 2px solid #ff4b2b;
    }
    .icon-result {
      margin-left: 10px;
      font-weight: bold;
    }
    button {
      display: block;
      margin: 20px auto;
      padding: 12px 25px;
      font-size: 1.1rem;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      transition: 0.3s;
      font-weight: bold;
    }
    #submit-btn {
      background: linear-gradient(45deg, #ff4b2b, #ff416c);
      color: #fff;
    }
    #submit-btn:hover {
      transform: scale(1.05);
    }
    #continue-btn {
      background: linear-gradient(45deg, #5ba55b, #5bbd6d);
      color: #fff;
    }
    #continue-btn:hover {
      transform: scale(1.05);
    }
    #result {
      text-align: center;
      margin-top: 10px;
      font-size: 1.1rem;
    }
    @media (max-width: 600px) {
      h1 {
        font-size: 1.5rem;
      }
      p {
        font-size: 0.9rem;
      }
      input[type="text"] {
        max-width: 100%;
      }
    }
  </style>
</head>
<body>
  <section class="Welcome">
    <div class="container">
      <h1>🗺 The Map of Decisions</h1>
      <p>You’ve entered the <strong>Business Analysis Room</strong>. Match each clue with the correct concept in English.</p>
      <p>You have <span id="timer">02:00</span> minutes.</p>

      <div id="folders-container"></div>

      <button onclick="submitAnswers()" id="submit-btn">🔓 Unlock</button>
      <div id="result"></div>
      <button id="continue-btn" onclick="next()" style="display:none;">➡ Continue</button>
    </div>
  </section>

  <script>
    function next() {
      window.location.href = "./homeL4.html";
    }

    const correctWords = [
      "causal chain",
      "flowchart",
      "solver",
      "work environment",
      "relationship",
      "channel"
    ];

    const folderHints = [
      "A logical sequence that links cause and effect.",
      "A visual scheme for step-by-step decision-making.",
      "A person who effectively solves problems.",
      "The workplace setting that shapes productivity.",
      "The bonds between people that influence results.",
      "The medium through which information flows."
    ];

    const folderContainer = document.getElementById("folders-container");

    for (let i = 0; i < folderHints.length; i++) {
      const div = document.createElement("div");
      div.className = "folder";
      div.innerHTML = `
        <p><strong>Hint ${i + 1}</strong></p>
        <p>${folderHints[i]}</p>
        <input type="text" id="input${i}" placeholder="Type answer">
        <span class="icon-result" id="icon${i}"></span>
      `;
      folderContainer.appendChild(div);
    }

    let savedProgress = JSON.parse(localStorage.getItem("progress_level3")) || [];
    for (let i = 0; i < correctWords.length; i++) {
      if (savedProgress[i]) {
        document.getElementById(`input${i}`).value = savedProgress[i];
      }
    }

    const submitBtn = document.getElementById("submit-btn");
    const continueBtn = document.getElementById("continue-btn");
    const resultDiv = document.getElementById("result");

    let gameFinished = false;

    for (let i = 0; i < correctWords.length; i++) {
      document.getElementById(`input${i}`).addEventListener("input", () => {
        if (!gameFinished) {
          let currentProgress = [];
          for (let j = 0; j < correctWords.length; j++) {
            currentProgress[j] = document.getElementById(`input${j}`).value;
          }
          localStorage.setItem("progress_level3", JSON.stringify(currentProgress));
        }
      });
    }

    function submitAnswers() {
      let correctCount = 0;

      for (let i = 0; i < correctWords.length; i++) {
        const input = document.getElementById(`input${i}`);
        const icon = document.getElementById(`icon${i}`);
        const userAnswer = input.value.trim().toLowerCase();
        const correct = correctWords[i].toLowerCase();

        input.classList.remove("correct", "incorrect");
        icon.textContent = "";

        if (userAnswer === "") {
          input.classList.add("incorrect");
          icon.textContent = "⚠";
          continue;
        }

        if (!/^[a-zA-Z\s]+$/.test(userAnswer)) {
          input.classList.add("incorrect");
          icon.textContent = "❌ Letters only";
          continue;
        }

        if (userAnswer === correct) {
          input.classList.add("correct");
          icon.textContent = "✅";
          correctCount++;
        } else {
          input.classList.add("incorrect");
          icon.textContent = "❌";
        }
      }

      let totalPoints = Math.round((correctCount / correctWords.length) * 20);

      // Guardar puntaje en localStorage
      let levelScores = JSON.parse(localStorage.getItem("levelScores")) || [];
      levelScores[2] = totalPoints;
      localStorage.setItem("levelScores", JSON.stringify(levelScores));

      resultDiv.innerHTML = `✅ You got <strong>${correctCount}</strong> correct answers.<br>⭐ Points this level: <strong>${totalPoints}</strong>`;

      for (let i = 0; i < correctWords.length; i++) {
        document.getElementById(`input${i}`).disabled = true;
      }
      submitBtn.disabled = true;

      localStorage.removeItem("progress_level3");
      localStorage.removeItem("timeLeft_level3");

      gameFinished = true;
      continueBtn.style.display = "inline-block";
      return true;
    }

    let time = parseInt(localStorage.getItem("timeLeft_level3"));
    if (isNaN(time) || time < 0) time = 120;
    const timerEl = document.getElementById("timer");

    const countdown = setInterval(() => {
      if (time < 0) {
        clearInterval(countdown);
        timerEl.textContent = "Time's up!";
        submitAnswers();
        return;
      } else {
        const minutes = Math.floor(time / 60);
        const seconds = time % 60;
        timerEl.textContent = `${minutes.toString().padStart(2, "0")}:${seconds.toString().padStart(2, "0")}`;
        time--;
        localStorage.setItem("timeLeft_level3", time);
      }
    }, 1000);

    window.addEventListener('beforeunload', function(e) {
      if (!gameFinished) {
        e.preventDefault();
        e.returnValue = '';
      }
    });
  </script>
</body>
</html>
